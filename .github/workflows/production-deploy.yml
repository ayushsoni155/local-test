# =============================================================================
#  PRODUCTION DEPLOY  ·  Manual Owner-Only Deployment
# =============================================================================
#  Trigger  : Manual (Actions UI → Run workflow)
#  Who runs : Only reviewers listed in the "production" GitHub Environment.
#
#  Flow:
#    Guard       — validate "DEPLOY" confirmation + environment approval gate
#    Smoke check — fresh secret scan + production build on HEAD of main
#    Deploy      — your deploy commands (uncomment one option below)
#    Audit log   — permanent record of who / what / when / why
#
#  ⚙️  Setup (one-time):
#    Settings → Environments → "production"
#      ✅ Required reviewers: owner GitHub username(s)
#      ✅ Restrict to: main branch only
#
#  ⚙️  Per-project knobs:
#    NODE_VERSION — match package.json engines.node
#    BUILD_CMD    — your production build command
#    USE_PRISMA   — set "false" if your project doesn't use Prisma
#
#  ⚙️  Secrets to add (Settings → Secrets → Actions):
#    Shopify CLI:  SHOPIFY_CLI_PARTNERS_TOKEN
#    Railway:      RAILWAY_TOKEN
#    Render:       RENDER_DEPLOY_HOOK_URL
#    Docker:       DOCKER_USERNAME, DOCKER_PASSWORD
# =============================================================================

name: "Production Deploy · Owner Only"

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DEPLOY to confirm'
        required: true
        default: ""
      reason:
        description: 'Reason / ticket (audit log)'
        required: false
        default: "Manual production release"

concurrency:
  group: production-deploy
  cancel-in-progress: false   # never cancel a running production deploy

permissions:
  contents: read
  id-token: write   # for OIDC-based targets (AWS, GCP)

env:
  NODE_VERSION: "20"
  BUILD_CMD:    "npm run build"
  USE_PRISMA:   "true"

# =============================================================================
jobs:
# ── Guard · Validate intent & environment approval ────────────────────────────
  guard:
    name: "Guard · Confirm Intent"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production   # 🔒 GitHub pauses here for reviewer approval
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DEPLOY" ]; then
            echo "::error::Type DEPLOY in the confirmation field to proceed."
            exit 1
          fi
          echo "✅ Confirmation accepted."

      - name: Log intent to job summary
        run: |
          {
            echo "### 🚀 Production Deployment Triggered"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Triggered by** | @${{ github.actor }} |"
            echo "| **Reason** | ${{ github.event.inputs.reason }} |"
            echo "| **Commit** | \`${GITHUB_SHA:0:7}\` |"
            echo "| **Time** | $(date -u '+%Y-%m-%d %H:%M UTC') |"
          } >> "$GITHUB_STEP_SUMMARY"

# ── Smoke Check · Fresh secret scan + build before touching production ─────────
  smoke-check:
    name: "Smoke Check · Pre-Deploy Validation"
    needs: guard
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      build_ok: ${{ steps.build.outputs.build_ok }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node & install
        uses: ./.github/actions/setup-node
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Secret scan
        id: secrets
        uses: ./.github/actions/secret-scan

      - name: Abort on secrets
        if: steps.secrets.outputs.findings != '0'
        run: |
          echo "::error::Secret scan found ${{ steps.secrets.outputs.findings }} finding(s). Deploy aborted."
          exit 1

      - name: Build application
        id: build
        uses: ./.github/actions/build-app
        with:
          build-cmd:  ${{ env.BUILD_CMD }}
          use-prisma: ${{ env.USE_PRISMA }}

      - name: Abort on build failure
        if: steps.build.outputs.build_ok != 'true'
        run: |
          echo "::error::Production build FAILED. Deploy aborted."
          exit 1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: prod-smoke-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: ignore
          path: |
            build.log
            gitleaks-report.json

# ── Deploy · Production ───────────────────────────────────────────────────────
  deploy:
    name: "Deploy · Production"
    needs: smoke-check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production   # 🔒 second environment gate (optional — remove if redundant)
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }

      - name: Setup Node & install
        uses: ./.github/actions/setup-node
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ── Choose your deploy method — uncomment one block ───────────────────

      # Option A · Shopify CLI (Partners / custom app)
      # - name: Shopify deploy
      #   env:
      #     SHOPIFY_CLI_PARTNERS_TOKEN: ${{ secrets.SHOPIFY_CLI_PARTNERS_TOKEN }}
      #   run: npx shopify app deploy --force

      # Option B · Railway CLI
      # - name: Railway deploy
      #   env:
      #     RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      #   run: |
      #     npm install -g @railway/cli
      #     railway up --service production

      # Option C · Render deploy hook
      # - name: Render deploy
      #   run: curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      # Option D · Docker build + push
      # - name: Docker deploy
      #   run: |
      #     echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      #     docker build -t myapp:production .
      #     docker push myapp:production

      # ── Placeholder (delete once you pick an option above) ────────────────
      - name: "⚠️  No deploy command configured"
        run: |
          echo "::warning::Add your deploy command above. See commented options for Shopify, Railway, Render, and Docker."

      # ── Audit log ─────────────────────────────────────────────────────────
      - name: Post-deploy summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          {
            echo ""
            echo "## 🚀 Production Deployment Complete"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Status** | $( [ "$STATUS" = "success" ] && echo '✅ Success' || echo '❌ Failed' ) |"
            echo "| **Commit** | \`${GITHUB_SHA:0:7}\` |"
            echo "| **Deployed by** | @${{ github.actor }} |"
            echo "| **Reason** | ${{ github.event.inputs.reason }} |"
            echo "| **Time** | $(date -u '+%Y-%m-%d %H:%M UTC') |"
            echo "| **Run** | [#${GITHUB_RUN_ID}](${RUN_URL}) |"
            echo ""
            echo "---"
            echo "<sub>Production deployments are permanently audited.</sub>"
          } >> "$GITHUB_STEP_SUMMARY"
