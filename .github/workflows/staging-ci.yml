# =============================================================================
#  MAIN → STAGING  ·  Staging Validation Pipeline
# =============================================================================
#  Trigger  : Push to `main` (fires after every owner merge)
#  Purpose  : Confirm main is healthy before production deployment.
#
#  Stages (sequential, fail-fast):
#    1 · Secrets        Gitleaks + TruffleHog + .env + private keys
#    2 · Dependencies   npm audit + Trivy (vuln / secret / misconfig)
#    3 · Static         ESLint + TypeScript + Prettier
#    4 · Tests          Vitest  (skip by setting SKIP_TESTS = true in repo vars)
#    5 · Build          Production build must compile cleanly
#    Gate               Single required status check
#
#  ⚙️  Per-project knobs (change these only):
#    NODE_VERSION  — match package.json engines.node
#    VITEST_CMD    — e.g. "npm test" or "npx vitest run"
#    BUILD_CMD     — e.g. "npm run build"
#    USE_PRISMA    — set "false" if your project doesn't use Prisma
# =============================================================================

name: "Staging Pipeline · Main → Staging"

on:
  push:
    branches: [main]

concurrency:
  group: staging-pipeline-${{ github.ref }}
  cancel-in-progress: true   # skip older run if two merges hit main quickly

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  VITEST_CMD:   "npx vitest run --reporter=verbose"
  BUILD_CMD:    "npm run build"
  USE_PRISMA:   "true"
  SKIP_TESTS:   ${{ vars.SKIP_TESTS || 'false' }}

# =============================================================================
jobs:
# ── Stage 1 · Secrets & Credentials ──────────────────────────────────────────
  stage-1-secrets:
    name: "Stage 1 · Secrets & Credentials"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      findings: ${{ steps.scan.outputs.findings }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Secret scan
        id: scan
        uses: ./.github/actions/secret-scan

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: staging-secrets-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: ignore
          path: |
            gitleaks-report.json
            trufflehog-history.json
            trufflehog-history.log
            env-committed.txt
            private-keys.txt
            private-keys-detail.tsv
            private-key-content.txt

# ── Stage 2 · Dependencies & Vulnerabilities ──────────────────────────────────
  stage-2-deps:
    name: "Stage 2 · Dependencies & Vulnerabilities"
    needs: stage-1-secrets
    if: needs.stage-1-secrets.outputs.findings == '0'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      critical:       ${{ steps.deps.outputs.critical }}
      warnings:       ${{ steps.deps.outputs.warnings }}
      trivy_critical: ${{ steps.trivy.outputs.critical }}
      trivy_warnings: ${{ steps.trivy.outputs.warnings }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node (no install — scans use lockfile only)
        uses: ./.github/actions/setup-node
        with:
          node-version: ${{ env.NODE_VERSION }}
          install: "false"

      - name: Dependency scan
        id: deps
        uses: ./.github/actions/dependency-scan

      - name: Trivy scan
        id: trivy
        uses: ./.github/actions/trivy-scan

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: staging-deps-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: ignore
          path: |
            npm-audit.json
            npm-outdated.json
            deprecated.txt
            trivy-report.json
            trivy-report.sarif

# ── Stage 3 · Static Code Analysis ───────────────────────────────────────────
  stage-3-static:
    name: "Stage 3 · Static Code Analysis"
    needs: stage-2-deps
    if: >
      needs.stage-2-deps.outputs.critical == '0' &&
      needs.stage-2-deps.outputs.trivy_critical == '0'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      critical:        ${{ steps.static.outputs.critical }}
      warnings:        ${{ steps.static.outputs.warnings }}
      eslint_errors:   ${{ steps.static.outputs.eslint_errors }}
      eslint_warnings: ${{ steps.static.outputs.eslint_warnings }}
      ts_errors:       ${{ steps.static.outputs.ts_errors }}
      prettier_issues: ${{ steps.static.outputs.prettier_issues }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node & install
        uses: ./.github/actions/setup-node
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Static analysis
        id: static
        uses: ./.github/actions/static-analysis

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: staging-static-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: ignore
          path: |
            eslint-report.json
            tsc.log
            prettier.log

# ── Stage 4 · Full Test Suite (Vitest) ────────────────────────────────────────
  stage-4-tests:
    name: "Stage 4 · Full Test Suite (Vitest)"
    needs: stage-3-static
    if: needs.stage-3-static.outputs.critical == '0' && vars.SKIP_TESTS != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      tests_passed:  ${{ steps.tests.outputs.tests_passed }}
      test_failures: ${{ steps.tests.outputs.test_failures }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node & install
        uses: ./.github/actions/setup-node
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run Vitest
        id: tests
        uses: ./.github/actions/run-tests
        with:
          vitest-cmd: ${{ env.VITEST_CMD }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: staging-tests-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: ignore
          path: |
            vitest-results.json
            vitest.log

# ── Stage 5 · Production Build Verification ───────────────────────────────────
  stage-5-build:
    name: "Stage 5 · Production Build"
    needs: [stage-3-static, stage-4-tests]
    # Runs when static is clean AND (tests passed OR were intentionally skipped)
    if: >
      always() &&
      needs.stage-3-static.outputs.critical == '0' &&
      (needs.stage-4-tests.result == 'success' ||
       needs.stage-4-tests.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      build_ok: ${{ steps.build.outputs.build_ok }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node & install
        uses: ./.github/actions/setup-node
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build application
        id: build
        uses: ./.github/actions/build-app
        with:
          build-cmd:  ${{ env.BUILD_CMD }}
          use-prisma: ${{ env.USE_PRISMA }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: staging-build-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: ignore
          path: build.log

# ── Gate · Staging Status (required status check) ─────────────────────────────
  gate:
    name: "Staging Pipeline · Status"   # ← this exact name goes in the branch ruleset
    needs: [stage-1-secrets, stage-2-deps, stage-3-static, stage-4-tests, stage-5-build]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4   # needed to resolve ./.github/actions/ci-gate

      - name: Download all stage reports
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: staging-*-${{ github.run_id }}
          merge-multiple: true
          path: reports

      - name: Report & gate decision
        uses: ./.github/actions/ci-gate
        with:
          context:        "staging"
          # Stage run flags
          stage2_ran:     ${{ needs.stage-2-deps.result != 'skipped' }}
          stage3_ran:     ${{ needs.stage-3-static.result != 'skipped' }}
          stage4_ran:     ${{ needs.stage-4-tests.result != 'skipped' }}
          stage5_ran:     ${{ needs.stage-5-build.result != 'skipped' }}
          # Stage 1 — secrets
          secrets:        ${{ needs.stage-1-secrets.outputs.findings }}
          # Stage 2 — dependencies
          dep_critical:   ${{ needs.stage-2-deps.outputs.critical }}
          dep_warnings:   ${{ needs.stage-2-deps.outputs.warnings }}
          trivy_critical: ${{ needs.stage-2-deps.outputs.trivy_critical }}
          trivy_warnings: ${{ needs.stage-2-deps.outputs.trivy_warnings }}
          # Stage 3 — static analysis
          static_critical: ${{ needs.stage-3-static.outputs.critical }}
          static_warnings: ${{ needs.stage-3-static.outputs.warnings }}
          eslint_errors:   ${{ needs.stage-3-static.outputs.eslint_errors }}
          ts_errors:       ${{ needs.stage-3-static.outputs.ts_errors }}
          # Stage 4 — tests
          tests_passed:   ${{ needs.stage-4-tests.outputs.tests_passed }}
          test_failures:  ${{ needs.stage-4-tests.outputs.test_failures }}
          skip_tests:     ${{ vars.SKIP_TESTS || 'false' }}
          # Stage 5 — build
          build_ok:       ${{ needs.stage-5-build.outputs.build_ok }}
