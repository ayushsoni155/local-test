name: "Secret & Credential Scan"
description: "Gitleaks + TruffleHog over full history, plus committed .env and private-key checks. Emits a `findings` count; the caller decides whether it blocks."

inputs:
  gitleaks-version:
    description: "Pinned Gitleaks release."
    required: false
    default: "8.24.2"

outputs:
  findings:
    description: "Total findings across all scanners."
    value: ${{ steps.evaluate.outputs.findings }}

runs:
  using: composite
  steps:
    - name: Install CLI utilities
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends jq wget curl ca-certificates

    - name: Install Gitleaks
      shell: bash
      run: |
        set -euo pipefail
        TARBALL="gitleaks_${{ inputs.gitleaks-version }}_linux_x64.tar.gz"
        wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${{ inputs.gitleaks-version }}/${TARBALL}"
        tar -xzf "${TARBALL}"
        sudo mv gitleaks /usr/local/bin/
        gitleaks version

    - name: Install TruffleHog
      shell: bash
      run: |
        set -euo pipefail
        curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
          | sudo sh -s -- -b /usr/local/bin
        trufflehog --version

    # Scan all history. --exit-code=0 so we always reach evaluation with a report.
    - name: Gitleaks history scan
      shell: bash
      run: |
        set -uo pipefail
        gitleaks git \
          --report-format=json \
          --report-path=gitleaks-report.json \
          --redact \
          --exit-code=0 \
          || echo "Gitleaks exited non-zero (captured for evaluation)"

    # Committed .env files in history (ignoring example/sample/template/dist).
    - name: Check history for .env files
      shell: bash
      run: |
        set -uo pipefail
        git log \
          --all \
          --diff-filter=A \
          --name-only \
          --pretty=format: \
          | grep -E '(^|/)\.env([.-]|$)' \
          | grep -Ev '\.env\.(example|sample|template|dist)$' \
          | sort -u \
          > env-committed.txt || true

        if [ -s env-committed.txt ]; then
          echo "::warning::Committed .env files detected in git history"
          cat env-committed.txt
        else
          echo "No committed .env files found."
        fi

    # Private-key FILES by name, in the working tree AND full history (a key
    # deleted later is still recoverable from old commits, so it must still count).
    - name: Check for private key files (tree + history)
      shell: bash
      run: |
        set -uo pipefail

        # [.] is a literal dot (no backslash → avoids awk escape warning).
        KEY_RE='(^|/)([^/]+[.](pem|key|p12|pfx)|id_rsa|id_dsa|id_ecdsa|id_ed25519)$'

        # Working tree.
        find . \
          -type d \( -name .git -o -name node_modules \) -prune \
          -o -type f \( \
               -name "*.pem" \
            -o -name "*.key" \
            -o -name "*.p12" \
            -o -name "*.pfx" \
            -o -name "id_rsa" \
            -o -name "id_dsa" \
            -o -name "id_ecdsa" \
            -o -name "id_ed25519" \
          \) -print \
          | sed 's#^\./##' \
          > private-keys-tree.txt || true

        # History: capture the commit that introduced each key (TSV: file, sha, date, subject).
        git log --all --diff-filter=A --date=short \
          --format='COMMIT%x09%h%x09%ad%x09%s' --name-only \
          | awk -F'\t' -v re="$KEY_RE" '
              $1 == "COMMIT" { sha=$2; date=$3; subj=$4; next }
              $0 ~ re && $0 !~ /(^|\/)node_modules\// { print $0 "\t" sha "\t" date "\t" subj }
            ' \
          | sort -u \
          > private-keys-history.tsv || true

        # Tree-only rows (not already recorded from history) so paths aren't listed twice.
        : > private-keys-tree.tsv
        if [ -s private-keys-tree.txt ]; then
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if ! cut -f1 private-keys-history.tsv 2>/dev/null | grep -qxF "$f"; then
              printf '%s\t-\t-\tworking tree (current checkout)\n' "$f" >> private-keys-tree.tsv
            fi
          done < private-keys-tree.txt
        fi

        # Combined detail table + the canonical unique-path list the evaluator counts.
        cat private-keys-history.tsv private-keys-tree.tsv \
          | sed '/^$/d' \
          | sort -u \
          > private-keys-detail.tsv || true
        cut -f1 private-keys-detail.tsv | sort -u | sed '/^$/d' > private-keys.txt || true

        if [ -s private-keys-detail.tsv ]; then
          echo "::warning::Private key files found in working tree and/or git history"
          echo "file<TAB>commit<TAB>date<TAB>where"
          cat private-keys-detail.tsv
        else
          echo "No private key files found."
        fi

    # Private-key MATERIAL (PEM blocks) in any commit, even if later removed.
    # Reports exact <sha>:<path> locations; -I skips binaries; key body never printed.
    - name: Check history for private key material
      shell: bash
      run: |
        set -uo pipefail
        PEM_RE='-----BEGIN ([A-Z ]+ )?PRIVATE KEY-----'

        : > private-key-content.txt
        for sha in $(git rev-list --all); do
          git grep -I -l -E -e "$PEM_RE" "$sha" 2>/dev/null \
            | sed "s/^${sha}:/${sha:0:10}\t/"
        done | sort -u > private-key-content.txt || true

        if [ -s private-key-content.txt ]; then
          echo "::warning::Private key material found in git history"
          echo "commit<TAB>file"
          cat private-key-content.txt
        else
          echo "No private key material found in git history."
        fi

    - name: TruffleHog history scan
      shell: bash
      run: |
        set -uo pipefail
        trufflehog git "file://$(pwd)" \
          --json \
          --only-verified \
          --no-update \
          > trufflehog-history.json 2>trufflehog-history.log \
          || echo "TruffleHog exited non-zero (captured for evaluation)"

    # Tally findings into a single count. No pass/fail here — the gate decides.
    - name: Evaluate results
      id: evaluate
      shell: bash
      run: |
        set -uo pipefail
        FINDINGS=0

        echo "===== GITLEAKS ====="
        GL_COUNT=0
        if [ -f gitleaks-report.json ]; then
          GL_COUNT=$(jq 'length' gitleaks-report.json 2>/dev/null || echo 0)
        fi
        if [ "$GL_COUNT" -gt 0 ]; then
          echo "❌ Gitleaks found $GL_COUNT secret(s)"
          FINDINGS=$((FINDINGS + GL_COUNT))
        else
          echo "✅ No Gitleaks findings"
        fi

        echo "===== ENV FILES ====="
        if [ -s env-committed.txt ]; then
          EN_COUNT=$(wc -l < env-committed.txt | tr -d ' ')
          echo "❌ .env files detected in git history"
          cat env-committed.txt
          FINDINGS=$((FINDINGS + EN_COUNT))
        else
          echo "✅ No committed .env files"
        fi

        echo "===== PRIVATE KEY FILES ====="
        if [ -s private-keys.txt ]; then
          PK_COUNT=$(wc -l < private-keys.txt | tr -d ' ')
          echo "❌ Private key files found (working tree and/or git history)"
          cat private-keys.txt
          FINDINGS=$((FINDINGS + PK_COUNT))
        else
          echo "✅ No private key files"
        fi

        echo "===== PRIVATE KEY MATERIAL (HISTORY) ====="
        if [ -s private-key-content.txt ]; then
          PKM_COUNT=$(grep -c . private-key-content.txt 2>/dev/null || true)
          PKM_COUNT=${PKM_COUNT:-0}
          if [ "$PKM_COUNT" -gt 0 ]; then
            echo "❌ Private key material found in $PKM_COUNT commit/file location(s)"
            cat private-key-content.txt
            FINDINGS=$((FINDINGS + PKM_COUNT))
          else
            echo "✅ No private key material in history"
          fi
        else
          echo "✅ No private key material in history"
        fi

        echo "===== TRUFFLEHOG ====="
        TH_COUNT=0
        if [ -s trufflehog-history.json ]; then
          # grep -c prints 0 and exits non-zero on no match; || true keeps a clean integer.
          TH_COUNT=$(grep -c '"SourceMetadata"' trufflehog-history.json 2>/dev/null || true)
          TH_COUNT=${TH_COUNT:-0}
        fi
        if [ "$TH_COUNT" -gt 0 ]; then
          echo "❌ TruffleHog found $TH_COUNT verified finding(s)"
          FINDINGS=$((FINDINGS + TH_COUNT))
        else
          echo "✅ No TruffleHog findings"
        fi

        echo ""
        echo "Total findings: $FINDINGS"
        echo "findings=$FINDINGS" >> "$GITHUB_OUTPUT"

    # Inline ::error annotations per finding + a summary table.
    - name: Report findings (annotations + summary)
      if: always()
      shell: bash
      run: |
        set -uo pipefail
        SHORT_SHA="${GITHUB_SHA:0:7}"

        # Gitleaks: [{RuleID, File, StartLine, Commit, Description}]
        if [ -s gitleaks-report.json ] && [ "$(jq 'length' gitleaks-report.json 2>/dev/null || echo 0)" -gt 0 ]; then
          jq -r '.[] | [
            (.File // "unknown"),
            (.StartLine // 1 | tostring),
            (.RuleID // "secret"),
            (.Commit // "unknown" | .[0:10]),
            (.Description // "Secret detected")
          ] | join("\t")' gitleaks-report.json 2>/dev/null \
          | while IFS=$'\t' read -r file line rule commit desc; do
              printf '::error file=%s,line=%s,title=Secret [%s] in commit %s::%s — commit: %s file: %s line: %s\n' \
                "$file" "$line" "$rule" "$commit" "$desc" "$commit" "$file" "$line"
            done || true
        fi

        if [ -s env-committed.txt ]; then
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            printf '::error file=%s,line=1,title=Committed .env file::.env file committed to git history — remove with git filter-repo\n' "$f"
          done < env-committed.txt || true
        fi

        if [ -s private-keys-detail.tsv ]; then
          while IFS=$'\t' read -r file sha date where; do
            [ -z "$file" ] && continue
            printf '::error file=%s,line=1,title=Private key [%s]::%s — %s\n' \
              "$file" "${sha:--}" "$file" "$where"
          done < private-keys-detail.tsv || true
        fi

        if [ -s trufflehog-history.json ]; then
          grep '"SourceMetadata"' trufflehog-history.json 2>/dev/null \
          | jq -r '
              .SourceMetadata.Data.Git.file? // "unknown" as $file |
              .SourceMetadata.Data.Git.line? // 1 as $line |
              .SourceMetadata.Data.Git.commit? // "unknown" as $commit |
              .DetectorName? // "secret" as $detector |
              "::error file=\($file),line=\($line | tostring),title=TruffleHog [\($detector)] commit \($commit[0:10])::Verified secret detected — \($detector) in \($file) at line \($line | tostring) (commit \($commit[0:10]))"
            ' 2>/dev/null || true
        fi

        GL=$(jq 'length' gitleaks-report.json 2>/dev/null || echo 0)
        EN=$(wc -l < env-committed.txt 2>/dev/null | tr -d ' '); EN=${EN:-0}
        PK=$(wc -l < private-keys.txt  2>/dev/null | tr -d ' '); PK=${PK:-0}
        TH=$(grep -c '"SourceMetadata"' trufflehog-history.json 2>/dev/null || true); TH=${TH:-0}
        TOTAL=$((GL + EN + PK + TH))

        {
          echo "### Stage 1 · Secret Scan — commit \`${SHORT_SHA}\`"
          echo ""
          echo "| Scanner | Findings |"
          echo "|:--------|:--------:|"
          echo "| Gitleaks | ${GL} |"
          echo "| Committed .env files | ${EN} |"
          echo "| Private key files | ${PK} |"
          echo "| TruffleHog (verified) | ${TH} |"
          echo "| **Total** | **${TOTAL}** |"

          if [ "${GL}" -gt 0 ] && [ -s gitleaks-report.json ]; then
            echo ""
            echo "#### Gitleaks Findings"
            echo "| File | Line | Rule | Commit | Description |"
            echo "|:-----|-----:|:-----|:-------|:------------|"
            jq -r '.[] | "| `" + (.File // "?") + "` | " + ((.StartLine // 1) | tostring) +
              " | `" + (.RuleID // "?") + "` | `" + ((.Commit // "?")[0:10]) +
              "` | " + (.Description // "-") + " |"' \
              gitleaks-report.json 2>/dev/null | head -20 || true
          fi

          if [ "${EN}" -gt 0 ]; then
            echo ""
            echo "#### Committed .env Files"
            echo '```'
            cat env-committed.txt
            echo '```'
          fi

          if [ "${PK}" -gt 0 ] && [ -s private-keys-detail.tsv ]; then
            echo ""
            echo "#### Private Key Files"
            echo "| File | Commit | Date | Location |"
            echo "|:-----|:-------|:-----|:---------|"
            while IFS=$'\t' read -r f sha date where; do
              [ -z "$f" ] && continue
              echo "| \`$f\` | \`${sha:--}\` | ${date:--} | $where |"
            done < private-keys-detail.tsv | head -20 || true
          fi
        } >> "$GITHUB_STEP_SUMMARY"
