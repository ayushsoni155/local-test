name: "Trivy Filesystem Scan"
description: "Trivy over the repo for vulns, secrets, misconfigs and licenses. Emits `critical` (crit/high vulns + secrets + crit/high misconfigs) and `warnings`. Never fails the job — the gate decides."

inputs:
  trivy-version:
    description: "Pinned Trivy release."
    required: false
    default: "0.71.1"

outputs:
  critical:
    description: "Blocking: CRITICAL/HIGH vulns + secrets + CRITICAL/HIGH misconfigs."
    value: ${{ steps.evaluate.outputs.critical }}
  warnings:
    description: "Non-blocking: MEDIUM/LOW vulns + misconfigs + license issues."
    value: ${{ steps.evaluate.outputs.warnings }}

runs:
  using: composite
  steps:
    - name: Install Trivy
      shell: bash
      run: |
        set -euo pipefail
        VER="${{ inputs.trivy-version }}"
        TARBALL="trivy_${VER}_Linux-64bit.tar.gz"
        URL="https://github.com/aquasecurity/trivy/releases/download/v${VER}/${TARBALL}"
        echo "Downloading ${URL}"
        curl -sSfL -o "${TARBALL}" "${URL}"
        tar -xzf "${TARBALL}" trivy
        sudo mv trivy /usr/local/bin/
        rm -f "${TARBALL}"
        trivy --version

    # Full-detail JSON report. --exit-code 0 so we always reach evaluation.
    - name: Trivy scan (JSON)
      shell: bash
      run: |
        set -uo pipefail
        trivy fs . \
          --scanners vuln,secret,misconfig,license \
          --severity CRITICAL,HIGH,MEDIUM,LOW \
          --format json \
          --output trivy-report.json \
          --exit-code 0 \
          --no-progress \
          --skip-dirs node_modules \
          || echo "Trivy (json) exited non-zero (captured)"
        if [ ! -s trivy-report.json ]; then echo '{}' > trivy-report.json; fi

    # SARIF for the GitHub Security tab. Best-effort.
    - name: Trivy scan (SARIF)
      shell: bash
      run: |
        set -uo pipefail
        trivy fs . \
          --scanners vuln,secret,misconfig,license \
          --severity CRITICAL,HIGH,MEDIUM,LOW \
          --format sarif \
          --output trivy-report.sarif \
          --exit-code 0 \
          --no-progress \
          --skip-dirs node_modules \
          || echo "Trivy (sarif) exited non-zero (captured)"

    # Classify into blocking vs warnings.
    - name: Evaluate
      id: evaluate
      shell: bash
      run: |
        set -uo pipefail
        F=trivy-report.json

        VULN_CRIT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL" or .Severity=="HIGH")] | length' "$F" 2>/dev/null || echo 0)
        VULN_WARN=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM" or .Severity=="LOW")] | length' "$F" 2>/dev/null || echo 0)
        SECRETS=$(jq   '[.Results[]?.Secrets[]?] | length' "$F" 2>/dev/null || echo 0)
        MISCFG_CRIT=$(jq '[.Results[]?.Misconfigurations[]? | select(.Severity=="CRITICAL" or .Severity=="HIGH")] | length' "$F" 2>/dev/null || echo 0)
        MISCFG_WARN=$(jq '[.Results[]?.Misconfigurations[]? | select(.Severity=="MEDIUM" or .Severity=="LOW")] | length' "$F" 2>/dev/null || echo 0)
        LICENSE=$(jq  '[.Results[]?.Licenses[]?] | length' "$F" 2>/dev/null || echo 0)

        VULN_CRIT=${VULN_CRIT:-0}; VULN_WARN=${VULN_WARN:-0}; SECRETS=${SECRETS:-0}
        MISCFG_CRIT=${MISCFG_CRIT:-0}; MISCFG_WARN=${MISCFG_WARN:-0}; LICENSE=${LICENSE:-0}

        CRITICAL=$((VULN_CRIT + SECRETS + MISCFG_CRIT))
        WARNINGS=$((VULN_WARN + MISCFG_WARN + LICENSE))

        echo "Trivy blocking: vuln_crit_high=$VULN_CRIT secrets=$SECRETS misconfig_crit_high=$MISCFG_CRIT -> $CRITICAL"
        echo "Trivy warnings: vuln_med_low=$VULN_WARN misconfig_med_low=$MISCFG_WARN license=$LICENSE -> $WARNINGS"

        {
          echo "critical=$CRITICAL"
          echo "warnings=$WARNINGS"
        } >> "$GITHUB_OUTPUT"

    # ::error annotations for crit/high vulns + secrets, then a summary table.
    - name: Report findings (annotations + summary)
      if: always()
      shell: bash
      run: |
        set -uo pipefail
        SHORT_SHA="${GITHUB_SHA:0:7}"
        F=trivy-report.json

        if [ -s "$F" ]; then
          jq -r '
            .Results[]? | .Target as $target |
            .Vulnerabilities[]? |
            select(.Severity == "CRITICAL" or .Severity == "HIGH") |
            [ $target, .Severity, (.VulnerabilityID // "?"),
              (.PkgName // "?"), (.InstalledVersion // "?"),
              (.FixedVersion // "no fix"), (.Title // "Vulnerability") ] | join("\t")
          ' "$F" 2>/dev/null \
          | while IFS=$'\t' read -r target sev cve pkg ver fix title; do
              printf '::error file=%s,line=1,title=Trivy [%s] %s in %s::%s — %s@%s → fix: %s\n' \
                "$target" "$sev" "$cve" "$pkg" "$title" "$pkg" "$ver" "$fix"
            done || true

          jq -r '
            .Results[]? | .Target as $target | .Secrets[]? |
            [ $target, (.StartLine // 1 | tostring), (.Title // "Secret"), (.RuleID // "?") ] | join("\t")
          ' "$F" 2>/dev/null \
          | while IFS=$'\t' read -r target line title rule; do
              printf '::error file=%s,line=%s,title=Trivy Secret [%s]::%s — rule: %s\n' \
                "$target" "$line" "$rule" "$title" "$rule"
            done || true
        fi

        VC=0; VW=0; SC=0; MC=0; MW=0; LIC=0
        if [ -s "$F" ]; then
          VC=$( jq '[.Results[]?.Vulnerabilities[]?   | select(.Severity=="CRITICAL" or .Severity=="HIGH")] | length' "$F" 2>/dev/null || echo 0)
          VW=$( jq '[.Results[]?.Vulnerabilities[]?   | select(.Severity=="MEDIUM"   or .Severity=="LOW")]  | length' "$F" 2>/dev/null || echo 0)
          SC=$( jq '[.Results[]?.Secrets[]?]           | length' "$F" 2>/dev/null || echo 0)
          MC=$( jq '[.Results[]?.Misconfigurations[]? | select(.Severity=="CRITICAL" or .Severity=="HIGH")] | length' "$F" 2>/dev/null || echo 0)
          MW=$( jq '[.Results[]?.Misconfigurations[]? | select(.Severity=="MEDIUM"   or .Severity=="LOW")]  | length' "$F" 2>/dev/null || echo 0)
          LIC=$(jq '[.Results[]?.Licenses[]?]          | length' "$F" 2>/dev/null || echo 0)
        fi

        {
          echo "### Stage 2 · Trivy Scan — commit \`${SHORT_SHA}\`"
          echo ""
          echo "| Category | Critical/High (blocking) | Med/Low (warning) |"
          echo "|:---------|:------------------------:|:-----------------:|"
          echo "| Vulnerabilities | ${VC} | ${VW} |"
          echo "| Secrets | ${SC} | — |"
          echo "| Misconfigurations | ${MC} | ${MW} |"
          echo "| License issues | — | ${LIC} |"

          BLOCK=$((VC + SC + MC))
          if [ "$BLOCK" -gt 0 ] && [ -s "$F" ]; then
            echo ""
            echo "#### Critical / High Findings"
            echo "| File | Severity | CVE / Rule | Package | Installed | Fix |"
            echo "|:-----|:---------|:-----------|:--------|:----------|:----|"
            jq -r '
              .Results[]? | .Target as $t |
              (
                (.Vulnerabilities[]? | select(.Severity=="CRITICAL" or .Severity=="HIGH") |
                  "| `" + $t + "` | " + .Severity + " | `" + (.VulnerabilityID // "?") +
                  "` | `" + (.PkgName // "?") + "` | " + (.InstalledVersion // "?") +
                  " | " + (.FixedVersion // "no fix") + " |"),
                (.Secrets[]? |
                  "| `" + $t + "` | SECRET | `" + (.RuleID // "?") + "` | — | — | — |")
              )
            ' "$F" 2>/dev/null | head -30 || true
          fi
        } >> "$GITHUB_STEP_SUMMARY"
