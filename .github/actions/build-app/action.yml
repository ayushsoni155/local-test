name: "Build Application"
description: "Optionally run prisma generate, then the production build. Emits `build_ok` ('true'/'false'). Never fails the job ÔÇö the gate decides."

inputs:
  build-cmd:
    description: "Production build command."
    required: false
    default: "npm run build"
  use-prisma:
    description: "Run `npx prisma generate` before building. Set 'false' if no Prisma."
    required: false
    default: "true"

outputs:
  build_ok:
    description: "'true' if the build succeeded, 'false' if it failed."
    value: ${{ steps.build.outputs.build_ok }}

runs:
  using: composite
  steps:
    - name: Generate Prisma client
      if: inputs.use-prisma == 'true'
      shell: bash
      run: npx prisma generate

    - name: Production build
      id: build
      shell: bash
      run: |
        set -uo pipefail
        BUILD_OK=false
        if ${{ inputs.build-cmd }} 2>&1 | tee build.log; then
          BUILD_OK=true
        fi
        echo "build_ok=${BUILD_OK}" >> "$GITHUB_OUTPUT"

    # On failure, turn the build.log into inline ::error annotations (Vite/Rollup,
    # tsc-in-vite, esbuild and plugin error shapes) plus a summary excerpt.
    - name: Report findings (annotations + summary)
      if: always()
      shell: bash
      run: |
        set -uo pipefail
        SHORT_SHA="${GITHUB_SHA:0:7}"
        BUILD_OK="${{ steps.build.outputs.build_ok }}"

        if [ -s build.log ] && [ "$BUILD_OK" != "true" ]; then
          # file(line,col): error ÔÇŽ  (rollup)
          grep -E '^\S.*\([0-9]+,[0-9]+\):' build.log 2>/dev/null \
          | sed 's/\r//' \
          | while IFS= read -r ln; do
              file=$(echo "$ln" | sed 's/(\([0-9]*\),\([0-9]*\)).*//' | xargs)
              line=$(echo "$ln" | grep -oP '(?<=\()\d+(?=,)')
              col=$(echo  "$ln" | grep -oP '(?<=,)\d+(?=\))')
              msg=$( echo "$ln" | sed 's/.*): //')
              [ -z "$file" ] && continue
              printf '::error file=%s,line=%s,col=%s,title=Build Error::%s\n' \
                "$file" "${line:-1}" "${col:-1}" "$msg"
            done || true

          # file:line:col - error TSÔÇŽ  (tsc inside vite)
          grep -E '^[^:]+:[0-9]+:[0-9]+ - error' build.log 2>/dev/null \
          | sed 's/\r//' \
          | while IFS= read -r ln; do
              file=$(echo "$ln" | cut -d: -f1)
              line=$(echo "$ln" | cut -d: -f2)
              col=$( echo "$ln" | cut -d: -f3)
              msg=$( echo "$ln" | cut -d: -f4- | xargs)
              [ -z "$file" ] && continue
              printf '::error file=%s,line=%s,col=%s,title=Build TypeScript Error::%s\n' \
                "$file" "${line:-1}" "${col:-1}" "$msg"
            done || true

          # Ôťś [ERROR] ÔÇŽ  (esbuild)
          grep -E 'Ôťś \[ERROR\]' build.log 2>/dev/null | head -20 \
          | while IFS= read -r ln; do
              msg=$(echo "$ln" | sed 's/.*\[ERROR\] //')
              printf '::error title=Build Error::%s\n' "$msg"
            done || true

          # [plugin:ÔÇŽ] ÔÇŽ error  (generic plugin)
          grep -E '^\[.+\].*error' build.log 2>/dev/null | head -10 \
          | while IFS= read -r ln; do
              printf '::error title=Build Plugin Error::%s\n' "$ln"
            done || true
        fi

        {
          if [ "$BUILD_OK" = "true" ]; then
            echo "### Stage 5 ┬Ě Production Build ÔÇö Ôťů PASSED ÔÇö commit \`${SHORT_SHA}\`"
          else
            echo "### Stage 5 ┬Ě Production Build ÔÇö ÔŁî FAILED ÔÇö commit \`${SHORT_SHA}\`"
            echo ""
            echo "#### Build Errors"
            echo '```'
            grep -E '(error|Error|ERROR|Ôťś)' build.log 2>/dev/null \
              | grep -v '^npm warn' | head -40 || true
            echo '```'
            echo ""
            echo "> ­čĺí **Tip:** Check the Annotations tab on this run for inline error locations."
          fi
        } >> "$GITHUB_STEP_SUMMARY"
