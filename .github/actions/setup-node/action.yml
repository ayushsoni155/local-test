name: "Setup Node.js & Install Dependencies"
description: >
  Sets up Node.js at a pinned version with npm cache enabled, then
  optionally runs `npm ci`. Used in every job that needs the project
  installed — centralises the setup so changing the Node version in one
  place propagates everywhere.

inputs:
  node-version:
    description: "Node.js version to install (matches package.json engines)."
    required: false
    default: "20"
  install:
    description: "Run `npm ci` after setup. Set to 'false' for scan-only jobs."
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Setup Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: "npm"

    - name: Install dependencies (npm ci)
      if: inputs.install == 'true'
      shell: bash
      run: npm ci
